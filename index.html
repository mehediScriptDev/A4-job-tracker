<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A4 Job Tracker</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
     <script src="https://kit.fontawesome.com/288dc013f9.js" crossorigin="anonymous"></script>

    <!-- tailwind and daisyUI cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom style for font family -->
    <style>
      .geist {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
    <section class="container mx-auto py-10">
      <div class="mb-5">
        <h1 class="text-3xl font-semibold">Job Application Tracker</h1>
      </div>

      <div class="grid grid-cols-3 items-center gap-3 lg:gap-5 xl:gap-6">
        <div class="p-4 bg-base-100 rounded-lg border-[#F1F2F4] border">
          <p class="text-[#323B49] text-sm">Total</p>
          <h3 class="text-black font-semibold text-2xl">8</h3>
        </div>
        <div class="p-4 bg-base-100 rounded-lg border-[#F1F2F4] border">
          <p class="text-[#323B49] text-sm">Interview</p>
          <h3 class="text-[#10B981] font-semibold text-2xl">8</h3>
        </div>
        <div class="p-4 bg-base-100 rounded-lg border-[#F1F2F4] border">
          <p class="text-[#323B49] text-sm">Rejected</p>
          <h3 class="text-[#EF4444] font-semibold text-2xl">8</h3>
        </div>
      </div>
      <div class="divider text-[#E6E7E9]"></div>
      <div class="space-y-5">
        <div class="flex justify-between items-center">
          <h1 class="text-[20px] font-semibold">Available Jobs</h1>
          <p class="text-[#64748B]">8 jobs</p>
        </div>
        <div class="space-x-2">
          <button class="btn bg-[#3B82F6] text-white px-5">All</button>
          <button class="btn border border-[#F1F2F4] bg-white text-[#64748B]">
            Pending
          </button>
          <button class="btn border border-[#F1F2F4] bg-white text-[#64748B]">
            Rejected
          </button>
        </div>

        <div>
          <!-- first card -->
          <div class="p-6 card bg-white border-[#F1F2F4] border space-y-4">
            <div class="flex justify-between items-center">
              <div>
                <h1 class="text-lg font-semibold geist">Mobile First Corp</h1>
              <p class="text-[#64748B] text-base font-normal">
                React Native Developer
              </p>
              </div>
              <div>
                <button class="rounded-full border border-[#F1F2F4] bg-white py-1 px-2">
                  <i class="fa-regular fa-trash-can text-[#64748B] text-base"></i>
                </button>
              </div>
            </div>

            <div>
              <p class="text-[#64748B] text-sm font-normal">
                Remote • Full-time • $130,000 - $175,000
              </p>
            </div>

            <div>
              <button
                class="btn bg-[#EEF4FF] text-[#002C5C] px-5 uppercase border-none"
              >
                Not Applied
              </button>
            </div>

            <div>
              <p class="text-[#323B49] text-sm">
                Build cross-platform mobile applications using React Native.
                Work on products used by millions of users worldwide.
              </p>
            </div>
            <div class="space-x-3">
              <button
                class="btn bg-transparent uppercase text-[#10B981] border border-[#10B981]"
              >
                interview
              </button>

              <button class="btn bg-transparent uppercase text-[#EF4444] border border-[#EF4444]">
                rejected
              </button>
            </div>
          </div>
          <!-- second card -->
           <!-- third card -->
            <!-- fourth card -->
             <!-- fifth card -->
              <!-- sixth card -->
                <!-- seventh card -->
                  <!-- eighth card -->
        </div>
      </div>
    </section>
  </body>
</html>
